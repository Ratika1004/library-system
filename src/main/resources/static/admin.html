<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <span class="brand">Library System</span>
    <div>
        <a href="index.html">Browse Books</a>
        <a href="search.html">Search</a>
        <a href="history.html">My History</a>
        <a href="admin.html">Admin</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="container">
    <h1>Admin Panel</h1>
    <div id="alert" class="alert"></div>

    <!-- Add Book Form -->
    <div class="card">
        <h2 style="margin-bottom:15px;">Add New Book</h2>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="title" placeholder="Book title">
        </div>
        <div class="form-group">
            <label>Author</label>
            <input type="text" id="author" placeholder="Author name">
        </div>
        <div class="form-group">
            <label>Category</label>
            <input type="text" id="category" placeholder="e.g. Fiction, Technology">
        </div>
        <div class="form-group">
            <label>Total Copies</label>
            <input type="number" id="totalCopies" placeholder="e.g. 3" min="1">
        </div>
        <button class="btn btn-primary" onclick="addBook()">Add Book</button>
    </div>

    <!-- All Books Table -->
    <h2 style="margin-bottom:15px;">Manage Books</h2>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Category</th>
            <th>Total</th>
            <th>Available</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="books-table"></tbody>
    </table>

    <!-- Currently Borrowed -->
    <h2 style="margin: 30px 0 15px;">Currently Borrowed Books</h2>
    <table>
        <thead>
        <tr>
            <th>User</th>
            <th>Book</th>
            <th>Borrow Date</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody id="borrowed-table"></tbody>
    </table>
</div>

<script>
    const USER_ROLE = localStorage.getItem('userRole');

    // Block non-admin users
    if (USER_ROLE !== 'ADMIN') {
        alert('Access denied. Admins only.');
        window.location.href = 'index.html';
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    function showAlert(message, type) {
        const alert = document.getElementById('alert');
        alert.textContent = message;
        alert.className = 'alert alert-' + type;
        alert.style.display = 'block';
        setTimeout(() => alert.style.display = 'none', 3000);
    }

    function loadBooks() {
        fetch('/api/books')
            .then(res => res.json())
            .then(books => {
                const tbody = document.getElementById('books-table');
                tbody.innerHTML = '';
                books.forEach(book => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${book.id}</td>
                            <td>${book.title}</td>
                            <td>${book.author}</td>
                            <td>${book.category}</td>
                            <td>${book.totalCopies}</td>
                            <td>${book.availableCopies}</td>
                            <td>
                                <button class="btn btn-danger"
                                    onclick="deleteBook(${book.id})">
                                    Delete
                                </button>
                            </td>
                        </tr>`;
                });
            });
    }

    function addBook() {
        const title       = document.getElementById('title').value.trim();
        const author      = document.getElementById('author').value.trim();
        const category    = document.getElementById('category').value.trim();
        const totalCopies = parseInt(document.getElementById('totalCopies').value);

        if (!title || !author || !category || !totalCopies) {
            showAlert('Please fill in all fields', 'danger');
            return;
        }

        fetch('/api/books', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                title, author, category,
                totalCopies,
                availableCopies: totalCopies
            })
        })
        .then(res => res.json())
        .then(() => {
            showAlert('Book added successfully!', 'success');
            document.getElementById('title').value = '';
            document.getElementById('author').value = '';
            document.getElementById('category').value = '';
            document.getElementById('totalCopies').value = '';
            loadBooks();
        });
    }

    function deleteBook(id) {
        if (!confirm('Are you sure you want to delete this book?')) return;
        fetch(`/api/books/${id}`, { method: 'DELETE' })
            .then(() => {
                showAlert('Book deleted!', 'success');
                loadBooks();
            });
    }

    function loadBorrowed() {
        fetch('/api/borrow/all')
            .then(res => res.json())
            .then(records => {
                const tbody = document.getElementById('borrowed-table');
                tbody.innerHTML = '';
                if (records.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No books currently borrowed.</td></tr>';
                    return;
                }
                records.forEach(record => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${record.user.name}</td>
                            <td>${record.book.title}</td>
                            <td>${record.borrowDate}</td>
                            <td><span class="badge badge-danger">${record.status}</span></td>
                        </tr>`;
                });
            });
    }

    loadBooks();
    loadBorrowed();
</script>
</body>
</html>
